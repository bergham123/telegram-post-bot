name: Process Posts

on:
  # Trigger on push to data/posts
  push:
    paths:
      - 'data/posts/*.json'
    branches:
      - main
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      post_id:
        description: 'Post ID to process'
        required: false
      action:
        description: 'Action to perform'
        required: false
        default: 'process'

jobs:
  process-new-posts:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pillow requests python-telegram-bot
    
    - name: Process posts
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      run: |
        python scripts/process_posts.py
    
    - name: Generate feed
      run: |
        python scripts/generate_feed.py
    
    - name: Commit and push changes
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add data/processed/ feeds/
        git diff --quiet && git diff --staged --quiet || git commit -m "Process new posts"
        git push
